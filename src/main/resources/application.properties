spring.application.name=mental-health-system

spring.datasource.url=jdbc:mysql://localhost:3306/mental_health?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


jwt.secret=mySecretKeyForJWTGenerationWithAtLeast32CharactersLong!
jwt.expiration=86400000


server.port=8080
logging.level.org.springframework.security=DEBUG
